<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <title>Windlog</title>
  <meta name="theme-color" content="#0b1622">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Windlog">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./app.css">
</head>
<body>
  <header>
    <div class="brand"><h1>Windlog</h1><span class="tag">Mysingen</span></div>
    <button class="icon-btn" id="setup-btn" title="Setup" aria-label="Setup">⚙</button>
  </header>

  <main>
    <section id="view-today" class="view active"></section>
    <section id="view-log" class="view"></section>
    <section id="view-stats" class="view"></section>
    <section id="view-data" class="view"></section>
  </main>

  <nav class="tabs">
    <button data-go="today" class="on"><span class="ic">🧭</span><span class="tx">Today</span></button>
    <button data-go="log"><span class="ic">＋</span><span class="tx">Log</span></button>
    <button data-go="stats"><span class="ic">📊</span><span class="tx">Stats</span></button>
    <button data-go="data"><span class="ic">⛁</span><span class="tx">Data</span></button>
  </nav>

  <div class="toast" id="toast"></div>

  <script type="module" src="./js/app.js"></script>
  <script>
    // setup opens the Data tab's config-ish area for now (config editing lives there)
    document.getElementById('setup-btn').onclick = () => document.querySelector('nav.tabs button[data-go="data"]').click();
  </script>
</body>
</html>
